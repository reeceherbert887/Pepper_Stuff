<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pepper Personality Test</title>
  <link rel="stylesheet" href="style.css">
  <script src="/libs/qimessaging/2/qimessaging.js"></script>
</head>
<body>

  <main class="tablet-screen">

    <section id="start-screen" class="screen active">
      <h1>Hull Robotics Society</h1>
      <h2>Robotics Personality Test</h2>
      <p>Find out what type of roboticist you are.</p>
      <button type="button" onclick="startQuiz()">Start</button>
    </section>

    <section id="quiz-screen" class="screen">
      <p id="question-count">Question 1 of 5</p>
      <h2 id="question-text">Question goes here</h2>
      <div id="answers"></div>
    </section>

    <section id="result-screen" class="screen">
      <h1 id="result-title">Your Result</h1>
      <p id="result-description"></p>

      <a href="https://hulluniunion.com/shop" target="_blank" class="qr-link">
        <div class="qr-box">
          <p>Scan to join Hull Robotics Society</p>
          <img class="qr-image" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://hulluniunion.com/shop" alt="Hull Uni Union shop QR code">
        </div>
      </a>

      <button type="button" onclick="resetQuiz()">Restart</button>
      <button type="button" onclick="nextSection()">Next Section</button>
    </section>

    <section id="projects-screen" class="screen">
      <h1>Choose a Project</h1>
      <p>Select which Pepper project you'd like to explore:</p>
      <div class="projects-container">
        <button type="button" class="project-button" onclick="selectProject('Pepper Dance')">Pepper Dance</button>
        <button type="button" class="project-button" onclick="selectProject('Openday')">Openday</button>
        <button type="button" class="project-button" onclick="selectProject('Robosoc 25-26')">Robosoc 25-26</button>
      </div>
      <button type="button" onclick="resetQuiz()" class="back-button">Back</button>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
